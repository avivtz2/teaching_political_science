        function getChapterTitle(articleId) {
            for (const chapter of syllabusData) {
                if (chapter.articles.some(a => a.id === articleId)) {
                    return chapter.title;
                }
            }
            return "";
        }

        function handleSelectArticle(chapterIndex, articleIndex) {
            const article = syllabusData[chapterIndex].articles[articleIndex];
            if (article.hasContent) {
                selectedArticle = article;
                window.scrollTo(0, 0);
                renderApp();
            }
        }

        function toggleChapter(index) {
            expandedChapterIndex = expandedChapterIndex === index ? null : index;
            renderApp();
        }

        function handleGoBack() {
            selectedArticle = null;
            renderApp();
            window.scrollTo(0, 0);
        }

        function scrollToSection(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                const headerOffset = 140; 
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                     top: offsetPosition,
                     behavior: "smooth"
                });
            }
        }

        // האזנה לאירועי גלילה למען השורה הדקה והדביקה במחשב
        window.addEventListener('scroll', () => {
            if (!selectedArticle) return;
            
            const stickyHeader = document.getElementById('sticky-article-header');
            const mainTitle = document.getElementById('main-article-title-container');
            
            if (stickyHeader && mainTitle) {
                const rect = mainTitle.getBoundingClientRect();
                // אם אזור הכותרת יצא מהמסך (כלפי מעלה), נציג את השורה
                if (rect.bottom < 84) {
                    stickyHeader.classList.remove('-translate-y-full', 'opacity-0');
                    stickyHeader.classList.add('translate-y-0', 'opacity-100');
                } else {
                    stickyHeader.classList.add('-translate-y-full', 'opacity-0');
                    stickyHeader.classList.remove('translate-y-0', 'opacity-100');
                }
            }
        });
